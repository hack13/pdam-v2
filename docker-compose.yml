services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdam"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build: .
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/pdam
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "4321:4321"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/pdam
      HOST: 0.0.0.0
      PORT: 4321
      BETTER_AUTH_URL: http://localhost:4321
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["pnpm", "sync:worker"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/pdam
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      app:
        condition: service_started

volumes:
  pgdata:
  uploads:
